<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cüzdan Asistanı | Gelir & Gider Takip</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0a0a0c;color:#ededee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
  #root{max-width:500px;margin:0 auto;min-height:100vh;background:#0a0a0c;padding-bottom:80px}
  .card{background:#121216;border:1px solid #1f1f24;border-radius:24px;padding:18px}
  .btn{cursor:pointer;transition:all 0.1s ease;font-weight:600;border:none;background:none}
  .btn:active{transform:scale(0.96);opacity:0.8}
  .tx-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:20px;background:#121216;margin-bottom:8px;cursor:pointer;border:1px solid #1f1f24}
  .tx-row:active{background:#1a1a20}
  .input-field{width:100%;background:#18181c;border-radius:20px;padding:14px 16px;color:#f0ede8;font-size:15px;margin-bottom:12px;border:1px solid #2a2a30;font-family:inherit}
  .input-field:focus{border-color:#7c3aed;outline:none;background:#202026}
  select.input-field{cursor:pointer}
  .chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:40px;font-size:12px;font-weight:600;background:#1e1e24;cursor:pointer;border:none;color:#ddd;font-family:inherit}
  .progress-bar{height:6px;background:#2a2a30;border-radius:10px;overflow:hidden;margin-top:8px}
  .progress-fill{height:100%;border-radius:10px;transition:width 0.3s;background:#34d399}
  .aud-badge{display:inline-flex;align-items:center;gap:4px;background:#0f1a22;border:1px solid #1e4a6e;border-radius:8px;padding:3px 8px;font-size:10px;font-family:monospace;color:#5bc4f5;font-weight:700}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end}
  .modal-card{background:#121216;border-radius:32px 32px 0 0;width:100%;padding:28px 22px 38px;max-height:80vh;overflow-y:auto}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:#0c0c10;backdrop-filter:blur(12px);border-top:1px solid #22222a;display:flex;justify-content:space-around;padding:8px 20px 22px;z-index:40}
  .nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:#8e8e98;font-weight:600;cursor:pointer}
  .nav-active{color:#c084fc}
  .floating-btn{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:28px;background:#7c3aed;box-shadow:0 6px 14px rgba(124,58,237,0.4);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:30;border:none;color:white}
  .floating-btn:active{transform:scale(0.92)}
  .avatar{width:48px;height:48px;border-radius:30px;background:#2a2a32;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
  .slide-up{animation:slideUp 0.25s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .flex-between{display:flex;justify-content:space-between;align-items:center}
  .mt-2{margin-top:8px}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#059669;color:white;padding:10px 20px;border-radius:40px;font-size:14px;font-weight:600;z-index:300;max-width:90%;text-align:center}
  .toast-error{background:#dc2626}
</style>
