<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<title>Notlar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --surface:#1a1a1a; --surface2:#242424;
  --border:#2e2e2e; --text:#f0f0f0; --muted:#666;
  --green:#00e676; --red:#ff4d4d; --accent:#f5c518;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:40px;}

.header{padding:52px 16px 20px;display:flex;flex-direction:column;gap:4px;}
.back-link{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 16px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;}
.back-link:active{background:var(--surface2);}
.title{text-align:center;font-size:20px;font-weight:700;margin-top:8px;}

.add-row{display:flex;gap:8px;padding:0 16px 16px;}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color 0.15s;}
.add-input:focus{border-color:var(--accent);}
.add-input::placeholder{color:var(--muted);}
.add-btn{background:var(--accent);color:var(--bg);border:none;border-radius:12px;padding:0 18px;font-size:18px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.add-btn:active{opacity:0.8;}

.list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.item-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:transparent;flex-shrink:0;cursor:pointer;position:relative;}
.item-check.done{background:var(--green);border-color:var(--green);}
.item-check.done::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bg);}
.item-text{flex:1;font-size:14px;font-weight:500;word-break:break-word;cursor:pointer;}
.item-text.done{color:var(--muted);text-decoration:line-through;}
.item-del{color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;}
.item-del:active{color:var(--red);}

.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-icon{font-size:28px;margin-bottom:8px;}
.empty-text{font-size:12px;}
</style>
</head>
<body>

<a class="back-link" href="https://erdalibis75-dotcom.github.io/cuzdanpro3/">◈ KASA</a>

<div class="header">
  <div class="title">📝 Notlar</div>
</div>

<div class="add-row">
  <input type="text" class="add-input" id="input" placeholder="Yeni madde ekle..." maxlength="200">
  <button class="add-btn" onclick="addItem()">+</button>
</div>

<div class="list" id="list"></div>

<script>
const KEY = 'notlar_items';
let items = JSON.parse(localStorage.getItem(KEY) || '[]');

function save(){
  localStorage.setItem(KEY, JSON.stringify(items));
  render();
}

function addItem(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text) return;
  items.unshift({ id: Date.now(), text, done: false });
  input.value = '';
  save();
}

function toggleItem(id){
  const it = items.find(i => i.id === id);
  if(it) it.done = !it.done;
  save();
}

function deleteItem(id){
  items = items.filter(i => i.id !== id);
  save();
}

function render(){
  const list = document.getElementById('list');
  if(items.length === 0){
    list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Henüz not yok</div></div>';
    return;
  }
  list.innerHTML = items.map(it => `
    <div class="item">
      <div class="item-check ${it.done ? 'done' : ''}" onclick="toggleItem(${it.id})"></div>
      <div class="item-text ${it.done ? 'done' : ''}" onclick="toggleItem(${it.id})">${escapeHtml(it.text)}</div>
      <div class="item-del" onclick="deleteItem(${it.id})">✕</div>
    </div>
  `).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('input').addEventListener('keydown', e => {
  if(e.key === 'Enter') addItem();
});

render();
</script>
</body>
</html>
