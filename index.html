

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gelir & Gider Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
</script>
 <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<html lang="tr">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; color: #f0ede8; padding: 15px; padding-bottom: 120px; }
    .pos { color: #34d399 !important; } 
    .neg { color: #f87171 !important; } 
    .card { background: #1a1a1a; border-radius: 24px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; text-align: center; transition: 0.3s; }
    .main-total-card { border-color: #7c3aed66; background: linear-gradient(145deg, #1e1e1e, #111); margin-bottom: 20px; position: relative; overflow: hidden; }
    .person-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; transition: 0.3s; }
    .person-box { background: #161616; border: 1px solid #333; border-radius: 18px; padding: 12px 5px; text-align: center; cursor: pointer; }
    .person-name { font-size: 11px; font-weight: 900; opacity: 0.5; margin-bottom: 5px; text-transform: uppercase; }
    .person-val { font-size: 13px; font-weight: 900; }
    .tx-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #161616; border-radius: 20px; margin-bottom: 8px; border: 1px solid #222; }
    .input-field { width: 100%; background: #222; border-radius: 14px; padding: 16px; color: #fff; border: 1px solid #333; margin-bottom: 12px; font-size: 16px; outline: none; }
    .btn-save { background: #7c3aed; color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-weight: 900; cursor: pointer; }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #222; z-index: 1000; }
    .hidden { display: none !important; }
    .btn-mini { background: none; border: 1px solid #333; color: #666; padding: 6px; border-radius: 8px; font-size: 9px; font-weight: 800; width: 100px; margin: 2px; }
    .mini-input { flex: 1; background: #000; border: 1px solid #333; border-radius: 12px; padding: 10px; color: #fff; font-size: 12px; font-weight: 700; outline: none; }
    .result-total-box { min-width: 80px; background: #7c3aed11; border: 1px solid #7c3aed66; border-radius: 12px; padding: 5px; text-align: center; }
    .result-label { font-size: 7px; font-weight: 900; color: #7c3aed; }
    .result-val { font-size: 12px; font-weight: 900; }
  </style>
</head>
<body>

<div id="home-view">
  <!-- Ana Kart: Duruma göre Genel veya Kişi ismi gözükür -->
  <div class="card main-total-card" id="main-display-card">
    <div id="main-card-label" style="font-size:10px; opacity:0.5; font-weight:900">GENEL DURUM</div>
    <h1 id="global-balance" style="font-size:32px; margin:5px 0">0 ₺</h1>
    <div id="global-aud" style="color:#7c3aed; font-weight:800; font-size:12px;">≈ 0 AUD</div>
  </div>

  <div class="person-grid" id="person-grid"></div>

  <!-- Detaylar Sadece Bir Kişi Seçildiğinde Gözükür -->
  <div id="person-detail-area" class="hidden">
    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
       <select id="month-filter" class="mini-input" style="flex: 1; border-color:#7c3aed44" onchange="renderHome()"></select>
       <select id="cat-search-filter" class="mini-input" style="flex: 1;" onchange="renderHome()"></select>
    </div>

    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 15px;">
      <input type="text" id="search-input" placeholder="Açıklama ara..." class="mini-input" style="flex: 2;" oninput="renderHome()">
      <div class="result-total-box" style="flex: 1; min-width: 100px;">
        <div id="active-person-label" class="result-label">AYLIK ÖZET</div>
        <div id="search-total-val" class="result-val">0 ₺</div>
      </div>
    </div>
    <div id="history-container"></div>
  </div>

  <div id="backup-btns" style="display: flex; justify-content: space-around; margin-top: 20px;">
    <button class="btn-mini" onclick="exportJSON()">📥 YEDEKLE</button>
    <button class="btn-mini" onclick="document.getElementById('import-file').click()">📤 YÜKLE</button>
    <input type="file" id="import-file" class="hidden" onchange="importJSON(event)">
  </div>
</div>

<div id="add-view" class="hidden">
  <h2 id="form-title" style="margin-bottom:20px; text-align:center;">İşlem Ekle</h2>
  <select id="f-type" class="input-field" onchange="updateCatOptions()"><option value="expense">Gider (-)</option><option value="income">Gelir (+)</option></select>
  <select id="f-person" class="input-field"></select>
  <select id="f-category" class="input-field"></select>
  <input type="date" id="f-date" class="input-field">
  <input type="number" id="f-amount" placeholder="Tutar (₺)" class="input-field">
  <input type="text" id="f-note" placeholder="Açıklama" class="input-field">
  <button class="btn-save" onclick="addTx()">KAYDET</button>
  <button id="del-btn" class="hidden" onclick="deleteCurrent()" style="width:100%; background:#f8717122; color:#f87171; border:none; padding:15px; border-radius:16px; margin-top:10px; font-weight:700; cursor:pointer;">SİL</button>
  <button onclick="goHome()" style="width:100%; background:none; border:none; color:#666; margin-top:20px; font-weight:700; cursor:pointer;">İPTAL</button>
</div>

<div class="nav-bar">
  <div onclick="goHome()" style="text-align:center; cursor:pointer"><div style="font-size:20px">🏠</div><div style="font-size:10px; font-weight:800">ANA SAYFA</div></div>
  <div onclick="showView('add')" style="text-align:center; cursor:pointer"><div style="font-size:20px">➕</div><div style="font-size:10px; font-weight:800">EKLE</div></div>
</div>

<script>
  let txs = JSON.parse(localStorage.getItem('txs_v2') || '[]');
  const people = ["Erdal", "A.A", "N.A"];
  const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
  let activeTab = null, rate = 0.0318, editId = null;

  const categories = {
    income: [{n:"Maaş", i:"💰"}, {n:"Kira", i:"🏠"}],
    expense: [
      {n:"Fatura Örnekköy", i:"⚡"}, {n:"Fatura Dedebaşı", i:"💧"}, {n:"Fatura Çimentepe", i:"🔥"},
      {n:"Fatura Seferihisar", i:"📡"}, {n:"Fatura Mersin", i:"🏢"}, {n:"E.T", i:"👔"},
      {n:"Ev", i:"🧹"}, {n:"Nil", i:"👧"}, {n:"Ex", i:"📉"}
    ]
  };

  function init() {
    const pSelect = document.getElementById('f-person');
    pSelect.innerHTML = "";
    people.forEach(p => pSelect.innerHTML += `<option value="${p}">${p}</option>`);
    document.getElementById('f-date').valueAsDate = new Date();
    updateCatOptions();
    updateMonthDropdown();
    renderHome();
  }

  function updateCatOptions() {
    const type = document.getElementById('f-type').value;
    const catSelect = document.getElementById('f-category');
    catSelect.innerHTML = "";
    categories[type].forEach(c => catSelect.innerHTML += `<option value="${c.n}">${c.i} ${c.n}</option>`);
  }

  function updateMonthDropdown() {
    const dropdown = document.getElementById('month-filter');
    const unique = [...new Set(txs.map(t => {
      const d = new Date(t.date);
      return `${months[d.getMonth()]} ${d.getFullYear()}`;
    }))];
    let opts = '<option value="Hepsi">Tüm Zamanlar</option>';
    unique.forEach(m => opts += `<option value="${m}">${m}</option>`);
    dropdown.innerHTML = opts;
  }

  function showView(v) {
    document.getElementById('home-view').classList.toggle('hidden', v !== 'home');
    document.getElementById('add-view').classList.toggle('hidden', v !== 'add');
    if(v === 'home') { editId = null; document.getElementById('form-title').innerText = "İşlem Ekle"; document.getElementById('del-btn').classList.add('hidden'); }
  }

  function goHome() { activeTab = null; showView('home'); renderHome(); }

  function prepareEdit(id) {
    const t = txs.find(x => x.id === id);
    editId = id;
    showView('add');
    document.getElementById('form-title').innerText = "İşlemi Düzenle";
    document.getElementById('del-btn').classList.remove('hidden');
    document.getElementById('f-type').value = t.type;
    updateCatOptions();
    document.getElementById('f-person').value = t.person;
    document.getElementById('f-category').value = t.category;
    document.getElementById('f-date').value = t.date;
    document.getElementById('f-amount').value = t.amount;
    document.getElementById('f-note').value = t.note;
  }

  function addTx() {
    const amt = document.getElementById('f-amount').value;
    const note = document.getElementById('f-note').value;
    if(!amt || !note) return alert("Doldur!");
    const data = { id: editId || Date.now(), type: document.getElementById('f-type').value, person: document.getElementById('f-person').value, category: document.getElementById('f-category').value, date: document.getElementById('f-date').value, amount: parseFloat(amt), note: note };
    if(editId) txs = txs.map(t => t.id === editId ? data : t); else txs.unshift(data);
    localStorage.setItem('txs_v2', JSON.stringify(txs));
    document.getElementById('f-amount').value = ""; document.getElementById('f-note').value = ""; document.getElementById('f-date').valueAsDate = new Date();
    updateMonthDropdown(); renderHome(); showView('home');
  }

  function deleteCurrent() { if(confirm("Silinsin mi?")) { txs = txs.filter(t => t.id !== editId); localStorage.setItem('txs_v2', JSON.stringify(txs)); updateMonthDropdown(); goHome(); } }

  function renderHome() {
    const mFilter = document.getElementById('month-filter').value;
    const sInput = document.getElementById('search-input').value.toLowerCase();
    const cFilter = document.getElementById('cat-search-filter').value;
    const grid = document.getElementById('person-grid');
    const detailArea = document.getElementById('person-detail-area');
    const backupArea = document.getElementById('backup-btns');

    if (!activeTab) {
      // --- ANA SAYFA GÖRÜNÜMÜ ---
      grid.classList.remove('hidden');
      detailArea.classList.add('hidden');
      backupArea.classList.remove('hidden');
      document.getElementById('main-card-label').innerText = "GENEL DURUM (TÜMÜ)";

      const totalBal = txs.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
      document.getElementById('global-balance').innerText = totalBal.toLocaleString('tr-TR') + " ₺";
      document.getElementById('global-aud').innerText = "≈ " + (totalBal * rate).toFixed(2) + " AUD";

      grid.innerHTML = "";
      people.forEach(p => {
        const pBal = txs.filter(t => t.person === p).reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
        grid.innerHTML += `<div class="person-box" onclick="togglePerson('${p}')"><div class="person-name">${p}</div><div class="person-val ${pBal >= 0 ? 'pos' : 'neg'}">${pBal.toLocaleString('tr-TR')}₺</div></div>`;
      });
    } else {
      // --- KİŞİ ODAK MODU ---
      grid.classList.add('hidden');
      detailArea.classList.remove('hidden');
      backupArea.classList.add('hidden');
      document.getElementById('main-card-label').innerText = activeTab.toUpperCase() + " BAKİYE (GENEL)";

      // Karttaki bakiye o kişinin GENEL bakiyesi olsun
      const pTotalBal = txs.filter(t => t.person === activeTab).reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
      document.getElementById('global-balance').innerText = pTotalBal.toLocaleString('tr-TR') + " ₺";
      document.getElementById('global-aud').innerText = "≈ " + (pTotalBal * rate).toFixed(2) + " AUD";

      // Filtrelenmiş Liste İşlemleri
      let pData = txs.filter(t => t.person === activeTab && (mFilter === "Hepsi" || `${months[new Date(t.date).getMonth()]} ${new Date(t.date).getFullYear()}` === mFilter));
      
      const uCats = [...new Set(pData.map(t => t.category))];
      let cOpts = '<option value="all">Tümü</option>';
      uCats.forEach(c => cOpts += `<option value="${c}">${c}</option>`);
      const catSelect = document.getElementById('cat-search-filter');
      if(catSelect.dataset.last !== cOpts) { catSelect.innerHTML = cOpts; catSelect.dataset.last = cOpts; }

      let pList = pData.filter(t => (cFilter === 'all' || !cFilter || t.category === cFilter) && t.note.toLowerCase().includes(sInput));
      const sTotal = pList.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
      document.getElementById('search-total-val').innerText = sTotal.toLocaleString('tr-TR') + " ₺";
      document.getElementById('search-total-val').className = "result-val " + (sTotal >= 0 ? "pos" : "neg");

      const container = document.getElementById('history-container');
      container.innerHTML = "";
      const allC = [...categories.income, ...categories.expense];
      pList.forEach(t => {
        const c = allC.find(x => x.n === t.category) || {i:"📁"};
        container.innerHTML += `<div class="tx-row" onclick="prepareEdit(${t.id})"><div style="text-align:left"><b>${t.note}</b><br><small style="opacity:0.6">${c.i} ${t.category} • ${t.date}</small></div><div class="${t.type === 'income' ? 'pos' : 'neg'}"><b>${t.amount.toLocaleString('tr-TR')}₺</b></div></div>`;
      });
    }
  }

  function togglePerson(p) { activeTab = p; renderHome(); }
  function exportJSON() { const b = new Blob([JSON.stringify(txs)], {type:"application/json"}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = "cuzdan_yedek.json"; a.click(); }
  function importJSON(e) { const r = new FileReader(); r.onload = (x) => { txs = JSON.parse(x.target.result); localStorage.setItem('txs_v2', JSON.stringify(txs)); updateMonthDropdown(); renderHome(); }; r.readAsText(e.target.files[0]); }
  init();
</script>
</body>
</html>
